- name: gathering facts
  hosts: local
  connection: local
  tasks:
    - name: print facts
      ansible.builtin.debug:
       msg: "{{ ansible_facts }}"

    - name: check ec2user or not
      ansible.builtin.debug:
        msg: "yes, package manager is ec2user"
      when: ansible_facts.user_id == "ec2-user"

    - name: check system or not
      ansible.builtin.debug:
        msg: "yes, system is available"
      when: ansible_facts.system == "Linux"

# "model": "Amazon Elastic Block Store",
    - name: check model or not
      ansible.builtin.debug:
        msg: "model is available"
      when: ansible_facts.model == "Amazon Elastic Block Store"