- name: check shell and command module
  hosts: local
  connection: local
  tasks:
    - name: check shell module
      # ansible.builtin.shell: cd /etc/passwd > users.txt
      ansible.builtin.shell: cat /etc/passwd | grep root
      register: users_output

    - name: print output
      ansible.builtin.debug:
       msg: "{{ users_output }}"